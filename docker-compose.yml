version: '3.8'
services:
  database:
    image: postgres:17-alpine
    container_name: boilerplate_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - boilerplate_pg_data:/var/lib/postgresql/data

volumes:
  boilerplate_pg_data:
